services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  graphiti-zep:
    build: ../graphiti-zep
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password

  studio:
    build: .
    ports:
      - "3000:3000"
      - "5001:5001"
    depends_on:
      - graphiti-zep
    environment:
      GRAPHITI_BASE_URL: http://graphiti-zep:8000
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    volumes:
      - studio_data:/app/data

volumes:
  neo4j_data:
  studio_data:
